services:
  db:
    image: postgres:16
    container_name: hotvideo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hotvideo
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hotvideo123}
      POSTGRES_DB: hotvideo
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotvideo"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hotvideo-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - ./data/redis:/data
    ports:
      - "6379:6379"

  api:
    build: ./api
    container_name: hotvideo-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "25050:25050"
    environment:
      - DATABASE_URL=postgresql+asyncpg://hotvideo:${DB_PASSWORD:-hotvideo123}@db:5432/hotvideo
      - REDIS_URL=redis://redis:6379/0
      - HEADLESS=false
      - MAX_BROWSER_INSTANCES=5
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - HOST_IP=${HOST_IP:-localhost}
      - VNC_PORT_OFFSET=20000
      - ASR_ENGINE=siliconflow
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - SILICONFLOW_MODEL=FunAudioLLM/SenseVoiceSmall
      - SILICONFLOW_BASE_URL=https://api.siliconflow.cn/v1/audio/transcriptions
      - SILICONFLOW_TIMEOUT=120
      - ZHIPU_API_KEY=${ZHIPU_API_KEY}
      - ZHIPU_BASE_URL=${ZHIPU_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}
      - ZHIPU_MODEL=${ZHIPU_MODEL:-GLM-4.1V-Thinking-Flash}
    volumes:
      - ./data/browser_profiles:/app/data/browser_profiles
      - ./data/videos:/app/data/videos
      - ./data/audio:/app/data/audio
      - ./data/output:/app/data/output
      - ./data/thumbnails:/app/data/thumbnails
      - ./logs:/app/logs
      - ./api/asr:/app/asr
      - ./api/config:/app/config
    env_file:
      - ./api/.env

volumes:
  postgres_data:
  redis_data:
