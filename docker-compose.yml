version: '3.8'

services:
  db:
    image: postgres:16
    container_name: hotvideo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "25432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hotvideo-net

  redis:
    image: redis:7-alpine
    container_name: hotvideo-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - ./data/redis:/data
    ports:
      - "26379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hotvideo-net

  api:
    build: ./api
    container_name: hotvideo-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - HEADLESS=false
      - MAX_BROWSER_INSTANCES=5
      - SECRET_KEY=${SECRET_KEY}
      - HOST_IP=${HOST_IP}
      - VNC_PORT_OFFSET=20000
      - ASR_ENGINE=siliconflow
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - SILICONFLOW_MODEL=${SILICONFLOW_MODEL}
      - SILICONFLOW_BASE_URL=${SILICONFLOW_BASE_URL}
      - SILICONFLOW_TIMEOUT=${SILICONFLOW_TIMEOUT}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY}
      - ZHIPU_BASE_URL=${ZHIPU_BASE_URL}
      - ZHIPU_MODEL=${ZHIPU_MODEL}
    volumes:
      - ./data/browser_profiles:/app/data/browser_profiles
      - ./data/videos:/app/data/videos
      - ./data/audio:/app/data/audio
      - ./data/output:/app/data/output
      - ./data/thumbnails:/app/data/thumbnails
      - ./logs:/app/logs
      - ./api/asr:/app/asr
      - ./api/config:/app/config
      - ./api/.env:/app/.env
    ports:
      - "25050:8000"
      - "25900-25910:5900-5910"
      - "26080-26090:6080-6090"
    command: >
      bash -lc "set -e;
      pkill -f websockify 2>/dev/null || true;
      pkill -f x11vnc 2>/dev/null || true;
      pkill -f 'Xvfb :99' 2>/dev/null || true;
      rm -rf /app/data/browser_profiles/*/Singleton* /tmp/.X*-lock /tmp/.X11-unix/X99 2>/dev/null || true;
      Xvfb :99 -screen 0 1920x1080x24 -ac &
      for i in \$(seq 1 20); do [ -S /tmp/.X11-unix/X99 ] && break; sleep 0.5; done;
      [ -S /tmp/.X11-unix/X99 ] || { echo 'Xvfb failed to create display :99'; exit 1; };
      export DISPLAY=:99;
      x11vnc -display :99 -rfbport 5900 -forever -shared -nopw -localhost -o /tmp/x11vnc.log &
      for i in \$(seq 1 20); do python -c 'import socket; s=socket.socket(); s.settimeout(0.2); s.connect((\"127.0.0.1\",5900)); s.close()' && break || sleep 0.5; done;
      python -c 'import socket; s=socket.socket(); s.settimeout(0.5); s.connect((\"127.0.0.1\",5900)); s.close()' || { echo 'x11vnc failed'; cat /tmp/x11vnc.log || true; exit 1; };
      websockify --web=/usr/share/novnc 6080 localhost:5900 &
      for i in \$(seq 1 20); do python -c 'import socket; s=socket.socket(); s.settimeout(0.2); s.connect((\"127.0.0.1\",6080)); s.close()' && break || sleep 0.5; done;
      python -c 'import socket; s=socket.socket(); s.settimeout(0.5); s.connect((\"127.0.0.1\",6080)); s.close()' || { echo 'websockify failed'; exit 1; };
      exec python main.py server --host 0.0.0.0 --port 8000"
    deploy:
      resources:
        limits:
          memory: 8G
    networks:
      - hotvideo-net

  web:
    image: nginx:alpine
    container_name: hotvideo-web
    restart: unless-stopped
    depends_on:
      - api
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "25080:80"
      - "25443:443"
    networks:
      - hotvideo-net

networks:
  hotvideo-net:
    driver: bridge
